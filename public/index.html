<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>1804-MD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #0A1F44;
    --ink-deep: #061330;
    --card: #16264F;
    --red: #C8102E;
    --gold: #C9A227;
    --cream: #F4F1EA;
    --cream-dim: rgba(244,241,234,0.62);
    --line: rgba(244,241,234,0.14);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(200,16,46,0.18), transparent 55%),
      radial-gradient(ellipse at 100% 110%, rgba(201,162,39,0.10), transparent 50%),
      var(--ink-deep);
    color: var(--cream);
    font-family:'Inter', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 28px 18px;
    position:relative;
    overflow-x:hidden;
  }

  /* Fen ranfòsman: liy fen tankou papye ofisyèl */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(244,241,234,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,241,234,0.025) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events:none;
  }

  .wrap{ width:100%; max-width: 420px; position:relative; z-index:1; }

  .eyebrow{
    display:flex; align-items:center; justify-content:center; gap:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
    color: var(--cream-dim);
    margin-bottom: 18px;
  }
  .eyebrow .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold); }

  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 44px;
    text-align:center;
    letter-spacing: -0.01em;
    line-height:1;
    margin-bottom: 6px;
  }
  h1 span{ color: var(--red); }

  .tagline{
    text-align:center;
    color: var(--cream-dim);
    font-size: 14.5px;
    margin-bottom: 32px;
    line-height:1.5;
  }

  .card{
    background: linear-gradient(165deg, var(--card), rgba(22,38,79,0.6));
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 34px 28px 28px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.55);
    position: relative;
  }

  /* Sele a - kwen anlè a gòch */
  .seal{
    position:absolute;
    top:-18px; left:-18px;
    width:46px; height:46px;
    border-radius:50%;
    background: conic-gradient(from 0deg, var(--ink) 0 25%, var(--red) 0 50%, var(--ink) 0 75%, var(--red) 0 100%);
    border: 2px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
  }
  .seal::after{
    content:"";
    width: 16px; height:16px;
    border-radius:50%;
    background: var(--ink-deep);
  }

  .qr-frame{
    background: var(--cream);
    border-radius: 12px;
    padding: 16px;
    aspect-ratio: 1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }

  .qr-frame img{
    width:100%; height:100%; object-fit:contain;
    border-radius: 4px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn{ from{ opacity:0; transform:scale(0.97);} to{ opacity:1; transform:scale(1);} }

  .placeholder{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    color: var(--ink);
  }

  .ring{
    width:42px; height:42px;
    border-radius:50%;
    border: 3px solid rgba(10,31,68,0.15);
    border-top-color: var(--red);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .placeholder p{
    font-family:'JetBrains Mono', monospace;
    font-size: 11.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: rgba(10,31,68,0.55);
  }

  .status{
    margin-top: 22px;
    display:flex; align-items:center; justify-content:center; gap:9px;
    font-family:'JetBrains Mono', monospace;
    font-size: 12.5px;
    letter-spacing: 0.03em;
    color: var(--cream-dim);
  }
  .status .pulse{
    width:7px; height:7px; border-radius:50%;
    background: var(--gold);
    box-shadow: 0 0 0 0 rgba(201,162,39,0.6);
    animation: pulse 1.6s infinite;
  }
  .status.connected .pulse{ background:#3FA66B; box-shadow:0 0 0 0 rgba(63,166,107,0.6); }
  .status.connected{ color:#DCEFE3; }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(201,162,39,0.55); }
    70%{ box-shadow:0 0 0 8px rgba(201,162,39,0); }
    100%{ box-shadow:0 0 0 0 rgba(201,162,39,0); }
  }

  .steps{
    margin-top: 30px;
    display:flex; flex-direction:column; gap:11px;
  }
  .step{
    display:flex; gap:12px; align-items:flex-start;
    font-size: 13px;
    color: var(--cream-dim);
    line-height:1.45;
  }
  .step b{
    font-family:'JetBrains Mono', monospace;
    color: var(--gold);
    font-size:11.5px;
    padding-top:1px;
  }

  footer{
    margin-top: 26px;
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.12em;
    color: rgba(244,241,234,0.32);
  }

  button.retry{
    margin-top:16px;
    width:100%;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--cream);
    font-family:'Inter';
    font-size: 13px;
    padding: 11px;
    border-radius: 9px;
    cursor:pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  button.retry:hover{ border-color: var(--gold); background: rgba(201,162,39,0.08); }
  button.retry:focus-visible{ outline: 2px solid var(--gold); outline-offset:2px; }

  @media (prefers-reduced-motion: reduce){
    .ring, .pulse, .qr-frame img { animation: none !important; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow"><span class="dot"></span> Aktivasyon Bot</div>
  <h1>1804<span>-MD</span></h1>
  <p class="tagline">Eskane kòd la ak WhatsApp ou pou aktive bot pa ou — prive, endepandan, pou ou sèlman.</p>

  <div class="card">
    <div class="seal"></div>

    <div class="qr-frame" id="qrFrame">
      <div class="placeholder" id="placeholder">
        <div class="ring"></div>
        <p>K ap prepare kòd la…</p>
      </div>
    </div>

    <div class="status" id="status">
      <span class="pulse"></span>
      <span id="statusText">An atant koneksyon</span>
    </div>

    <button class="retry" id="retryBtn" style="display:none;">Jenere yon nouvo kòd</button>

    <div class="steps">
      <div class="step"><b>01</b> Louvri WhatsApp → Paramèt → Aparèy konekte</div>
      <div class="step"><b>02</b> Tape “Konekte yon aparèy”</div>
      <div class="step"><b>03</b> Eskane kòd anwo a ak kamera telefòn ou</div>
    </div>
  </div>

  <footer>1804-PPN VERSION 1.0</footer>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const qrFrame = document.getElementById('qrFrame');
  const placeholder = document.getElementById('placeholder');
  const status = document.getElementById('status');
  const statusText = document.getElementById('statusText');
  const retryBtn = document.getElementById('retryBtn');

  function requestSession(){
    statusText.textContent = 'An atant koneksyon';
    status.classList.remove('connected');
    retryBtn.style.display = 'none';
    qrFrame.innerHTML = '<div class="placeholder"><div class="ring"></div><p>K ap prepare kòd la…</p></div>';
    socket.emit('create-session');
  }

  socket.on('connect', requestSession);

  socket.on('qr', (qrImage) => {
    qrFrame.innerHTML = `<img src="${qrImage}" alt="QR code pou konekte WhatsApp" />`;
    statusText.textContent = 'Kòd pare — eskane l kounye a';
  });

  socket.on('ready', () => {
    qrFrame.innerHTML = `
      <div class="placeholder" style="color:#1E7A45;">
        <div style="width:46px;height:46px;border-radius:50%;background:#E7F5EC;display:flex;align-items:center;justify-content:center;font-size:22px;">✓</div>
        <p style="color:#1E7A45;">Bot la aktive</p>
      </div>`;
    status.classList.add('connected');
    statusText.textContent = '1804-MD konekte ak siksè';
  });

  socket.on('disconnected', () => {
    statusText.textContent = 'Sesyon fèmen';
    status.classList.remove('connected');
    retryBtn.style.display = 'block';
  });

  socket.on('error', (msg) => {
    statusText.textContent = msg || 'Yon erè rive';
    retryBtn.style.display = 'block';
  });

  retryBtn.addEventListener('click', requestSession);
</script>
</body>
</html>
